<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resell iOS Pro</title>

<style>
:root{
  --bg:#020617;
  --card:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);
  --text:#f1f5f9;
  --muted:#94a3b8;
  --green:#30d158;
  --red:#ff453a;
}

body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(180deg,#0b1220,#020617);
  color:var(--text);
}

.app{
  max-width:420px;
  margin:auto;
  padding:16px;
  padding-bottom:100px;
}

.header{
  font-size:22px;
  font-weight:700;
  margin-bottom:10px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(30px);
  border-radius:26px;
  padding:16px;
  border:1px solid var(--border);
}

.balance{
  font-size:34px;
  font-weight:900;
  color:var(--green);
}

/* ADD BOX */
.add-box{
  margin-top:16px;
  padding:16px;
  border-radius:20px;
  background:#0f172a;
  border:1px solid rgba(255,255,255,.05);
}

.add-title{
  font-weight:700;
  margin-bottom:10px;
}

.input-group{
  margin-bottom:10px;
}

.input-group label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:4px;
  display:block;
}

.input-group input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#020617;
  color:white;
}

.row{
  display:flex;
  gap:10px;
}

button{
  width:100%;
  margin-top:10px;
  padding:14px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#30d158,#22c55e);
  font-weight:700;
}

/* operations */
.op{
  display:flex;
  justify-content:space-between;
  padding:14px;
  border-radius:20px;
  background:rgba(255,255,255,.04);
  margin-top:10px;
}

.meta{
  font-size:12px;
  color:var(--muted);
}

/* nav */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  background:rgba(15,23,42,.7);
  backdrop-filter:blur(25px);
  border-radius:24px;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.nav div{
  text-align:center;
  font-size:12px;
  color:var(--muted);
}

.nav .active{
  color:var(--green);
}

.tab{display:none}
.tab.active{display:block}

canvas{
  width:100%;
  height:180px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">Resell</div>

<!-- HOME -->
<div id="home" class="tab active">
<div class="card">

<div id="total" class="balance">0</div>

<div class="add-box">
  <div class="add-title">Новая сделка</div>

  <div class="input-group">
    <label>Товар</label>
    <input id="name">
  </div>

  <div class="row">
    <div class="input-group">
      <label>Покупка</label>
      <input id="buy" type="number">
    </div>

    <div class="input-group">
      <label>Продажа</label>
      <input id="sell" type="number">
    </div>
  </div>

  <div class="input-group">
    <label>Количество</label>
    <input id="qty" type="number" value="1">
  </div>

  <button onclick="addItem()">Добавить сделку</button>
</div>

<div id="ops"></div>

</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="tab">
<div class="card">

<div id="total2" class="balance">0</div>
<canvas id="chart"></canvas>

</div>
</div>

</div>

<div class="nav">
<div onclick="switchTab('home',this)" class="active">🏠<br>Главная</div>
<div onclick="switchTab('analytics',this)">📊<br>Аналитика</div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('items') || '[]');

function format(n){
  return n.toLocaleString('ru-RU');
}

function render(){
  let total=0;
  let sum=0;
  let data=[];

  items.forEach(i=>{
    let p=(i.sell-i.buy)*i.qty;
    total+=p;
    sum+=p;
    data.push(sum);
  });

  document.getElementById('total').innerText=format(total);
  document.getElementById('total2').innerText=format(total);

  drawChart(data);
  renderOps();
}

function renderOps(){
  const ops=document.getElementById('ops');
  ops.innerHTML='';

  items.slice().reverse().forEach(i=>{
    let p=(i.sell-i.buy)*i.qty;

    ops.innerHTML+=`
      <div class="op">
        <div>
          <div>${i.name}</div>
          <div class="meta">${i.qty} • ${format(i.buy)} → ${format(i.sell)}</div>
        </div>
        <div style="color:${p>=0?'#30d158':'#ff453a'}">
          ${format(p)}
        </div>
      </div>
    `;
  });
}

function addItem(){
  const name=document.getElementById('name').value;
  const buy=parseFloat(document.getElementById('buy').value);
  const sell=parseFloat(document.getElementById('sell').value);
  const qty=parseInt(document.getElementById('qty').value);

  if(!name||isNaN(buy)||isNaN(sell)||isNaN(qty)) return;

  items.push({name,buy,sell,qty});
  localStorage.setItem('items',JSON.stringify(items));

  document.querySelectorAll('input').forEach(i=>i.value='');
  render();
}

function drawChart(data){
  const c=document.getElementById('chart');
  const ctx=c.getContext('2d');

  ctx.clearRect(0,0,c.width,c.height);
  if(!data.length) return;

  let max=Math.max(...data);
  let step=c.width/(data.length-1||1);

  ctx.beginPath();
  data.forEach((v,i)=>{
    let x=i*step;
    let y=c.height-(v/max)*c.height;
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });

  ctx.strokeStyle="#30d158";
  ctx.lineWidth=3;
  ctx.stroke();
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.nav div').forEach(d=>d.classList.remove('active'));
  el.classList.add('active');
}

render();
</script>

</body>
</html>
